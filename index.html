  <style>
    .initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* 使用纯色背景 #9fdded */
      background-color: #9fdded;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* 样式 243 动画 */
    .loading-243 {
      width: 50px;
      aspect-ratio: 1;
      /* 使用深蓝色 #2a90ab 作为动画主色 */
      box-shadow: 0 0 0 3px #2a90ab inset;
      border-radius: 50%;
      position: relative;
      animation: loading-243 7s infinite;
      margin-bottom: 60px;
    }
    .loading-243:before,
    .loading-243:after {
      content: "";
      position: absolute;
      top: calc(100% + 3px);
      left: calc(50% - 12.5px);
      box-shadow: inherit;
      width: 25px;
      aspect-ratio: 1;
      border-radius: 50%;
      transform-origin: 50% -28px;
      animation: loading-243 1.5s infinite;
    }
    .loading-243:after {
      animation-delay: -0.75s;
    }
    @keyframes loading-243 {
      100% {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      margin-top: 40px;
      color: #2a90ab;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: 0.6em;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="initial-loader">
      <div class="loading-243"></div>
      <div class="loader-text">Loading Data</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
